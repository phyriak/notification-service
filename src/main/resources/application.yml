spring:
  application:
    name: notification-service

  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT}
    protocol: smtp

  kafka:
    listener:
      ack-mode: record

management:
  endpoints:
    web:
      exposure:
        include: info,health,prometheus

email-notification:
   system-email: ${SENDER_EMAIL}
   retry-count: 3