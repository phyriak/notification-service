server:
  port: 8089

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/ecommerce?currentSchema=${DB_SCHEMA}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    open-in-view: false

    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        default_schema: ${DB_SCHEMA}
        jdbc.batch_size: 1000
        order_inserts: true
        order_updates: true

    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: ${DB_SCHEMA}


