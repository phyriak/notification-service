name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build application
        run: mvn clean package

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            phyriak/notification-service:${{ github.sha }}
            phyriak/notification-service:latest

  deploy:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            docker pull phyriak/notification-service:latest
            
            docker stop notification-service || true
            docker rm notification-service || true

            docker run -d \
            --name notification-service \
            --restart unless-stopped \
            -p 8089:8089 \
            -e SPRING_PROFILES_ACTIVE="${{ secrets.SPRING_PROFILES_ACTIVE:uat }}" \
            -e DB_URL="${{ secrets.DB_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e DB_SCHEMA="${{ secrets.DB_SCHEMA }}" \
            -e EMAIL_USER="${{ secrets.EMAIL_USER }}" \
            -e EMAIL_PASSWORD="${{ secrets.EMAIL_PASSWORD }}" \
            phyriak/notification-service:latest

            echo "Waiting for application..."

            for i in {1..12}; do
              if curl -f http://localhost:8089/actuator/health; then
                echo "Application is UP"
                exit 0
              fi

              sleep 10
            done

            echo "Application failed to start"
            exit 1